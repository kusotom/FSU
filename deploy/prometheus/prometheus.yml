global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000

  - job_name: mqtt_bridge
    static_configs:
      - targets:
          - mqtt-bridge:9108

  - job_name: postgres_exporter
    static_configs:
      - targets:
          - postgres-exporter:9187
