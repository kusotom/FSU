global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - C:/Users/Administrator/Desktop/fsu-platform/deploy/local/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8000

  - job_name: mqtt_bridge
    static_configs:
      - targets:
          - 127.0.0.1:9108
